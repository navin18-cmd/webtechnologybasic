<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - Goal Tracker</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body data-page="signup">
    <div class="bg-orb orb-1"></div>
    <div class="bg-orb orb-2"></div>
    <main class="center-wrap">
        <section class="auth-card glass-card reveal">
            <h1>Sign Up</h1>
            <p>Create your account and start your streak.</p>
            <form id="signupForm" action="php/signup.php" method="post" novalidate>
                <div class="field">
                    <label for="name">Name</label>
                    <input type="text" id="name" name="name" required maxlength="80">
                </div>
                <div class="field">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" required>
                </div>
                <div class="field">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" required minlength="6">
                </div>
                <button class="btn-primary" type="submit">Sign Up</button>
                <p id="signupError" class="form-error"></p>
            </form>
            <p class="small-text">Already have an account? <a href="login.html">Login</a></p>
        </section>
    </main>
    <script src="js/script.js"></script>
</body>
</html>
