<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration Form | Experiment 8</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            padding: 40px 20px;
        }

        .page-title {
            font-family: 'Outfit', sans-serif;
            color: #fff;
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 6px;
        }

        .page-subtitle {
            color: rgba(255, 255, 255, 0.7);
            font-size: 14px;
            margin-bottom: 32px;
        }

        .main-container {
            width: 100%;
            max-width: 900px;
        }

        /* Form Card */
        .form-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
            border-radius: 24px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.2);
            margin-bottom: 32px;
        }

        .form-title {
            font-family: 'Outfit', sans-serif;
            font-size: 28px;
            font-weight: 800;
            color: #1f2937;
            text-align: center;
            margin-bottom: 32px;
        }

        .form-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
        }

        .form-group.full-width {
            grid-column: span 2;
        }

        .form-group label {
            font-size: 14px;
            font-weight: 600;
            color: #374151;
            margin-bottom: 8px;
        }

        .form-group label .required {
            color: #ef4444;
        }

        .form-group input,
        .form-group select,
        .form-group textarea {
            padding: 14px 18px;
            border-radius: 12px;
            border: 2px solid #e5e7eb;
            font-size: 15px;
            font-family: 'Inter', sans-serif;
            color: #1f2937;
            background: #fff;
            transition: all 0.3s ease;
            outline: none;
        }

        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 4px rgba(102, 126, 234, 0.15);
        }

        .form-group input::placeholder {
            color: #9ca3af;
        }

        .form-group textarea {
            resize: vertical;
            min-height: 80px;
        }

        /* Range slider */
        .range-container {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .range-container input[type="range"] {
            flex: 1;
            height: 6px;
            -webkit-appearance: none;
            appearance: none;
            background: linear-gradient(90deg, #667eea, #764ba2);
            border-radius: 3px;
            border: none;
            padding: 0;
        }

        .range-container input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 22px;
            height: 22px;
            border-radius: 50%;
            background: #667eea;
            cursor: pointer;
            border: 3px solid #fff;
            box-shadow: 0 2px 8px rgba(102, 126, 234, 0.4);
        }

        .range-value {
            font-size: 22px;
            font-weight: 700;
            color: #667eea;
            min-width: 40px;
            text-align: right;
        }

        /* Radio & Checkbox Groups */
        .radio-group, .checkbox-group {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
        }

        .radio-option, .checkbox-option {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
        }

        .radio-option input, .checkbox-option input {
            width: 18px;
            height: 18px;
            accent-color: #667eea;
            cursor: pointer;
        }

        .radio-option span, .checkbox-option span {
            font-size: 15px;
            color: #374151;
        }

        /* Submit Button */
        .submit-btn {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: #fff;
            border: none;
            border-radius: 14px;
            font-size: 16px;
            font-weight: 700;
            font-family: 'Inter', sans-serif;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 8px;
        }

        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(102, 126, 234, 0.4);
        }

        .submit-btn:active {
            transform: translateY(0);
        }

        /* Data Table Section */
        .table-section {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
            border-radius: 24px;
            padding: 32px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.2);
        }

        .table-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 20px;
        }

        .table-title {
            font-family: 'Outfit', sans-serif;
            font-size: 22px;
            font-weight: 700;
            color: #1f2937;
        }

        .record-count {
            font-size: 14px;
            color: #6b7280;
            background: #f3f4f6;
            padding: 6px 14px;
            border-radius: 100px;
        }

        .data-table {
            width: 100%;
            border-collapse: separate;
            border-spacing: 0;
            border-radius: 12px;
            overflow: hidden;
        }

        .data-table th {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: #fff;
            padding: 14px 16px;
            font-size: 13px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            text-align: left;
        }

        .data-table td {
            padding: 14px 16px;
            font-size: 14px;
            color: #374151;
            border-bottom: 1px solid #f3f4f6;
        }

        .data-table tbody tr {
            transition: background 0.2s;
        }

        .data-table tbody tr:hover {
            background: rgba(102, 126, 234, 0.05);
        }

        .data-table tbody tr:last-child td {
            border-bottom: none;
        }

        .delete-btn {
            background: #fee2e2;
            color: #ef4444;
            border: none;
            padding: 6px 14px;
            border-radius: 8px;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            font-family: 'Inter', sans-serif;
        }

        .delete-btn:hover {
            background: #ef4444;
            color: #fff;
        }

        .empty-state {
            text-align: center;
            padding: 40px;
            color: #9ca3af;
        }

        .empty-state .icon {
            font-size: 48px;
            margin-bottom: 12px;
        }

        .back-link {
            display: inline-block;
            margin-top: 32px;
            color: rgba(255, 255, 255, 0.8);
            text-decoration: none;
            font-size: 14px;
            transition: color 0.3s;
        }

        .back-link:hover {
            color: #fff;
        }

        @media (max-width: 600px) {
            .form-grid {
                grid-template-columns: 1fr;
            }
            .form-group.full-width {
                grid-column: span 1;
            }
            .form-card, .table-section {
                padding: 24px;
            }
            .data-table {
                font-size: 12px;
            }
            .data-table th, .data-table td {
                padding: 10px 8px;
            }
        }
    </style>
</head>
<body>

    <h1 class="page-title">📋 Registration Form</h1>
    <p class="page-subtitle">Experiment 8 — Form with Tabular Data Collection</p>

    <div class="main-container">
        <!-- Registration Form -->
        <div class="form-card">
            <h2 class="form-title">Registration Form</h2>
            <form id="regForm" onsubmit="handleSubmit(event)">
                <div class="form-grid">
                    <div class="form-group">
                        <label>Full Name <span class="required">*</span></label>
                        <input type="text" id="fullName" placeholder="Enter your full name" required>
                    </div>

                    <div class="form-group">
                        <label>Age <span class="required">*</span></label>
                        <div class="range-container">
                            <input type="range" id="age" min="15" max="60" value="18" oninput="document.getElementById('ageVal').textContent=this.value">
                            <span class="range-value" id="ageVal">18</span>
                        </div>
                    </div>

                    <div class="form-group">
                        <label>Email <span class="required">*</span></label>
                        <input type="email" id="email" placeholder="name@example.com" required>
                    </div>

                    <div class="form-group">
                        <label>Password <span class="required">*</span></label>
                        <input type="password" id="password" placeholder="Min 6 characters" required minlength="6">
                    </div>

                    <div class="form-group">
                        <label>Telephone <span class="required">*</span></label>
                        <input type="tel" id="phone" placeholder="+91 XXXXX XXXXX" required>
                    </div>

                    <div class="form-group">
                        <label>Date of Birth</label>
                        <input type="date" id="dob">
                    </div>

                    <div class="form-group">
                        <label>Gender <span class="required">*</span></label>
                        <div class="radio-group">
                            <label class="radio-option">
                                <input type="radio" name="gender" value="Male" required>
                                <span>Male</span>
                            </label>
                            <label class="radio-option">
                                <input type="radio" name="gender" value="Female">
                                <span>Female</span>
                            </label>
                            <label class="radio-option">
                                <input type="radio" name="gender" value="Other">
                                <span>Other</span>
                            </label>
                        </div>
                    </div>

                    <div class="form-group">
                        <label>Department</label>
                        <select id="department">
                            <option value="">Select Department</option>
                            <option value="CSE">CSE</option>
                            <option value="ECE">ECE</option>
                            <option value="EEE">EEE</option>
                            <option value="ME">ME</option>
                            <option value="IT">IT</option>
                            <option value="Civil">Civil</option>
                        </select>
                    </div>

                    <div class="form-group full-width">
                        <button type="submit" class="submit-btn">Submit Registration</button>
                    </div>
                </div>
            </form>
        </div>

        <!-- Data Table -->
        <div class="table-section">
            <div class="table-header">
                <h3 class="table-title">📊 Registered Users</h3>
                <span class="record-count" id="recordCount">0 records</span>
            </div>
            <div id="tableContainer">
                <div class="empty-state" id="emptyState">
                    <div class="icon">📭</div>
                    <p>No registrations yet. Fill in the form above to get started!</p>
                </div>
                <table class="data-table" id="dataTable" style="display:none;">
                    <thead>
                        <tr>
                            <th>#</th>
                            <th>Name</th>
                            <th>Age</th>
                            <th>Email</th>
                            <th>Phone</th>
                            <th>Gender</th>
                            <th>Dept</th>
                            <th>DOB</th>
                            <th>Action</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody"></tbody>
                </table>
            </div>
        </div>
    </div>

    <a href="../../index.html" class="back-link">← Back to Lab Home</a>

    <script>
        let records = [];

        function handleSubmit(e) {
            e.preventDefault();

            const gender = document.querySelector('input[name="gender"]:checked');

            const record = {
                name: document.getElementById('fullName').value,
                age: document.getElementById('age').value,
                email: document.getElementById('email').value,
                phone: document.getElementById('phone').value,
                gender: gender ? gender.value : 'N/A',
                department: document.getElementById('department').value || 'N/A',
                dob: document.getElementById('dob').value || 'N/A',
            };

            records.push(record);
            renderTable();
            document.getElementById('regForm').reset();
            document.getElementById('ageVal').textContent = '18';
        }

        function renderTable() {
            const tbody = document.getElementById('tableBody');
            const table = document.getElementById('dataTable');
            const emptyState = document.getElementById('emptyState');
            const countEl = document.getElementById('recordCount');

            if (records.length === 0) {
                table.style.display = 'none';
                emptyState.style.display = 'block';
                countEl.textContent = '0 records';
                return;
            }

            table.style.display = 'table';
            emptyState.style.display = 'none';
            countEl.textContent = records.length + ' record' + (records.length > 1 ? 's' : '');

            tbody.innerHTML = '';
            records.forEach((r, i) => {
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td>${i + 1}</td>
                    <td>${r.name}</td>
                    <td>${r.age}</td>
                    <td>${r.email}</td>
                    <td>${r.phone}</td>
                    <td>${r.gender}</td>
                    <td>${r.department}</td>
                    <td>${r.dob}</td>
                    <td><button class="delete-btn" onclick="deleteRecord(${i})">Delete</button></td>
                `;
                tbody.appendChild(tr);
            });
        }

        function deleteRecord(index) {
            records.splice(index, 1);
            renderTable();
        }
    </script>

</body>
</html>
